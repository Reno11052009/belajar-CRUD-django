<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4">Products</h1>
    <a href="{% url 'product_create' %}" class="btn btn-primary mb-3">Tambah Produk</a>

    <div class="row">
        {% for product in products %}
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">Price: ${{ product.price }}</p>
                    <a href="{% url 'product_update' product.id %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'product_delete' product.id %}" class="btn btn-sm btn-danger">Hapus</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p>Tidak ada produk.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
